<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>המוצרים שלנו</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
    }

    .product-card {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transition: transform 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .product-content {
      padding: 16px;
    }

    .product-title {
      font-size: 20px;
      margin: 0 0 10px;
    }

    .product-description {
      font-size: 14px;
      line-height: 1.6;
      color: #555;
      min-height: 44px;
      margin-bottom: 12px;
    }

    .product-price {
      font-size: 22px;
      font-weight: bold;
      color: #111;
    }

    .loading,
    .error,
    .empty {
      text-align: center;
      font-size: 18px;
      padding: 40px 20px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>המוצרים שלנו</h1>
    <div id="productsContainer" class="loading">טוען מוצרים...</div>
  </div>

  <script>
    const API_URL = "YOUR_SCRIPT_URL";

    async function loadProducts() {
      const container = document.getElementById("productsContainer");

      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error("שגיאה בטעינת הנתונים");
        }

        const data = await response.json();

        if (!data.success || !Array.isArray(data.products)) {
          throw new Error("מבנה נתונים לא תקין");
        }

        if (data.products.length === 0) {
          container.className = "empty";
          container.innerHTML = "אין כרגע מוצרים להצגה.";
          return;
        }

        container.className = "products-grid";
        container.innerHTML = data.products.map(product => `
          <div class="product-card">
            <img
              class="product-image"
              src="${escapeHtml(product.image_url || '')}"
              alt="${escapeHtml(product.name || '')}"
              onerror="this.src='https://via.placeholder.com/600x400?text=No+Image'"
            />
            <div class="product-content">
              <h2 class="product-title">${escapeHtml(product.name || '')}</h2>
              <div class="product-description">${escapeHtml(product.description || '')}</div>
              <div class="product-price">₪${escapeHtml(String(product.price || '0'))}</div>
            </div>
          </div>
        `).join("");

      } catch (error) {
        container.className = "error";
        container.innerHTML = "לא הצלחנו לטעון את המוצרים.";
        console.error(error);
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadProducts();
  </script>
</body>
</html>
